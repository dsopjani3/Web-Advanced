<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lesson 5</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Persomal Information</legend>
        <label for="firstname">First Name:</label><br>
        <input type="text" id="firstname" name="firstname" value="John" #readonly><br>
        <label for="lastname">Lastname:</label><br>
        <input type="text" id="lastname" name="lastname" disabled><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" size="40" placeholder="Password"><br><br>
        <label>Gender:</label><br>
        <input type="radio" id="male" name="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="female">
        <label for="female">Female</label><br><br>
        <label>Hobbies:</label><br>
        <input type="checkbox" id="gaming" name="gaming">
        <label for="gaming">Gaming</label><br>
        <input type="checkbox" id="football" name="football">
        <label for="football">Football</label><br>
        <input type="checkbox" id="swimming" name="swimming">
        <label for="swimming">Swimming</label><br><br>
        <input type="checkbox" id="swimming" name="swimming">
        <label for="pets">Choose a pet</label>
        <select name="pet" id="pet">
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Parrot">Parrot</option>
        </select><br><br>


        <textarea name="message" rows="10" cols="20" maxlength="50"></textarea><br><br>





        <input type="submit" name="submit" id="submit">
        </fieldset>
    </form>
</body>
</html>
